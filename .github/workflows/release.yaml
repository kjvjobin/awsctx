name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build cross-platform binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<<"$target"
            ext=""
            if [[ "$goos" == "windows" ]]; then
              ext=".exe"
            fi
            out="dist/awsctx_${goos}_${goarch}${ext}"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -ldflags "-s -w" -o "$out" ./cmd/awsctx
          done

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum awsctx_* > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/awsctx_*
            dist/checksums.txt
          generate_release_notes: true
